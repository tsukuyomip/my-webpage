name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            mixer/package-lock.json
            media-vault/package-lock.json
            gkms-sprtcrd/package-lock.json
            train-sandbox/package-lock.json

      - name: Build mixer
        working-directory: mixer
        run: |
          npm ci
          npm run build

      - name: Build media-vault
        working-directory: media-vault
        run: |
          npm ci
          npm run build

      - name: Build gkms-sprtcrd
        working-directory: gkms-sprtcrd
        run: |
          npm ci
          npm run build

      - name: Build train-sandbox
        working-directory: train-sandbox
        run: |
          npm ci
          npm run build

      - name: Assemble site (root static page + /mixer/ + /media-vault/ + /gkms-sprtcrd/ + /train-sandbox/)
        run: |
          mkdir -p _site/mixer _site/media-vault _site/gkms-sprtcrd _site/train-sandbox
          cp index.html style.css _site/
          cp -r mixer/dist/* _site/mixer/
          cp -r media-vault/dist/* _site/media-vault/
          cp -r gkms-sprtcrd/dist/* _site/gkms-sprtcrd/
          cp -r train-sandbox/dist/* _site/train-sandbox/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
